name: pyapprox
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  #- numpy>=1.20,<=1.26.4
  - numpy>=1.20
  - matplotlib
  - scipy
  - jupyter
  - pytest
  - coverage>=6.4
  - pytest-cov
  - pip
  - setuptools
  - sympy
  - networkx
  - pytorch
  - numba
  - cvxpy
  # gpu support
  - torchvision
  - torchaudio
  # linting
  - jedi
  - black
  - flake8
  - yapf==0.40.1 
  # make html in docs folder
  - sphinx
  - sphinx-gallery
  - jupyter
  - pip:
    - scikit-fem
    - sphinx_copybutton
    - sphinx_rtd_theme
    - numpydoc
    - sphinx_automodapi
    - umbridge
    - autopep8
