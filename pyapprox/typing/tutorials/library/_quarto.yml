          contents:
            - kle_introduction.qmd
            - kle_mesh_and_data_driven.qmd
            - kle_spde.qmd
        - section: "Optimization Under Uncertainty"
          contents:
            - design_under_uncertainty.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - file: ../_macros_html.tex

execute:
  echo: true
  warning: false
  freeze: auto

jupyter: python3

notebook-links: true
