project:
  type: website
  output-dir: _site

website:
  title: "PyApprox UQ Tutorials"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Tutorial Library"
        href: library/index.qmd
      - text: "In Progress"
        href: in_progress/index.qmd
      - text: "Workshops"
        href: workshops/index.qmd
    right:
      - icon: github
        href: https://github.com/sandialabs/pyapprox
  sidebar:
    - title: "In-Progress Tutorials"
      style: "docked"
      search: true
      contents:
        - section: "Getting Started"
          contents:
            - in_progress/setup_environment.qmd
            - in_progress/uq_problem_framing.qmd
        - section: "Forward UQ"
          contents:
            - in_progress/forward_model_definition.qmd
            - in_progress/random_variables_distributions.qmd
            - in_progress/quantities_of_interest.qmd
            - in_progress/monte_carlo_basics.qmd
        - section: "Sensitivity Analysis"
          contents:
            - in_progress/sobol_sensitivity_analysis.qmd
            - in_progress/bin_based_sensitivity.qmd
        - section: "Inverse Problems"
          contents:
            - in_progress/bayesian_calibration_intro.qmd
            - in_progress/hamiltonian_mcmc.qmd
        - section: "Surrogates"
          contents:
            - in_progress/polynomial_chaos_expansion.qmd
            - in_progress/gaussian_process_surrogates.qmd
        - section: "FunctionTrain"
          contents:
            - in_progress/functiontrain_intro.qmd
            - in_progress/functiontrain_pce.qmd
            - in_progress/functiontrain_moments_math.qmd
            - in_progress/functiontrain_moments.qmd
            - in_progress/functiontrain_sensitivity_math.qmd
            - in_progress/functiontrain_sensitivity.qmd
        - section: "Multifidelity"
          contents:
            - in_progress/control_variates.qmd
            - in_progress/multifidelity_monte_carlo.qmd
            - in_progress/acv_two_model.qmd
            - in_progress/acv_framework.qmd
            - in_progress/multioutput_statistics.qmd
            - in_progress/multioutput_statistics_usage.qmd
            - in_progress/pacv_estimators.qmd
            - in_progress/allocation_matrices.qmd
            - in_progress/pacv_recursion_analysis.qmd
        - section: "Advanced Topics"
          contents:
            - in_progress/optimal_experimental_design.qmd
            - in_progress/optimization_under_uncertainty.qmd
            - in_progress/backend_alternatives.qmd
            - in_progress/benchmark_setup.qmd

format:
  html:
    theme: cosmo
    css: in_progress/styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - file: _macros_html.tex
  pdf:
    documentclass: article
    include-in-header:
      - file: _macros.tex

execute:
  echo: true
  warning: false
  freeze: auto

jupyter: python3

# Notebook conversion
notebook-links: true
