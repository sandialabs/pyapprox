project:
  type: website
  output-dir: _site

website:
  title: "PyApprox Tutorials - In Progress"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
    right:
      - icon: github
        href: https://github.com/sandialabs/pyapprox
  sidebar:
    - title: "In-Progress Tutorials"
      style: "docked"
      search: true
      contents:
        - section: "Getting Started"
          contents:
            - uq_problem_framing.qmd
        - section: "Forward UQ"
          contents:
            - forward_model_definition.qmd
            - quantities_of_interest.qmd
        - section: "Inverse Problems"
          contents:
            - hamiltonian_mcmc.qmd
        - section: "FunctionTrain"
          contents:
            - functiontrain_pce.qmd
            - functiontrain_moments_math.qmd
            - functiontrain_moments.qmd
        - section: "Multifidelity"
          contents:
            - multioutput_statistics.qmd
            - multioutput_statistics_usage.qmd
            - pacv_estimators.qmd
            - pacv_recursion_analysis.qmd
        - section: "Multi-Fidelity Surrogates"
          contents:
            - mfnet_concept.qmd
            - mfnet_usage.qmd
        - section: "GP Statistics"
          contents:
            - gp_marginalization.qmd
            - gp_mean_uncertain_inputs.qmd
            - gp_mean_of_variance.qmd
            - gp_variance_of_variance.qmd
            - gp_separable_kernel_integrals.qmd
            - gp_statistics_workflow.qmd
            - gp_sobol_uncertainty.qmd
        - section: "Advanced Topics"
          contents:
            - optimal_experimental_design.qmd
            - optimization_under_uncertainty.qmd
            - backend_alternatives.qmd
            - benchmark_setup.qmd
            - ode_integration.qmd
            - beam_model_introduction.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - file: ../_macros_html.tex

execute:
  echo: true
  warning: false
  freeze: auto

jupyter: python3

notebook-links: true
