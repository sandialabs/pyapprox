project:
  type: website
  output-dir: _site

website:
  title: "PyApprox Tutorials - In Progress"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
    right:
      - icon: github
        href: https://github.com/sandialabs/pyapprox
  sidebar:
    - title: "In-Progress Tutorials"
      style: "docked"
      search: true
      contents:
        - section: "Getting Started"
          contents:
            - uq_problem_framing.qmd
        - section: "Forward UQ"
          contents:
            - forward_model_definition.qmd
            - random_variables_distributions.qmd
            - quantities_of_interest.qmd
            - monte_carlo_basics.qmd
        - section: "Sensitivity Analysis"
          contents:
            - sobol_sensitivity_analysis.qmd
            - bin_based_sensitivity.qmd
        - section: "Inverse Problems"
          contents:
            - bayesian_calibration_intro.qmd
            - hamiltonian_mcmc.qmd
        - section: "Surrogates"
          contents:
            - polynomial_chaos_expansion.qmd
            - gaussian_process_surrogates.qmd
        - section: "FunctionTrain"
          contents:
            - functiontrain_intro.qmd
            - functiontrain_pce.qmd
            - functiontrain_moments_math.qmd
            - functiontrain_moments.qmd
            - functiontrain_sensitivity_math.qmd
            - functiontrain_sensitivity.qmd
        - section: "Multifidelity"
          contents:
            - control_variates.qmd
            - multifidelity_monte_carlo.qmd
            - acv_two_model.qmd
            - acv_framework.qmd
            - multioutput_statistics.qmd
            - multioutput_statistics_usage.qmd
            - pacv_estimators.qmd
            - allocation_matrices.qmd
            - pacv_recursion_analysis.qmd
        - section: "Advanced Topics"
          contents:
            - optimal_experimental_design.qmd
            - optimization_under_uncertainty.qmd
            - backend_alternatives.qmd
            - benchmark_setup.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - file: ../_macros_html.tex

execute:
  echo: true
  warning: false
  freeze: auto

jupyter: python3

notebook-links: true
