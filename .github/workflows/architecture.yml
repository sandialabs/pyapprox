name: Architecture

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main, "dev/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  import-linter:
    name: Import architecture check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and linter
        run: |
          pip install -e "packages/pyapprox[lint]" --quiet
          pip install import-linter --quiet

      - name: Run import-linter
        run: |
          lint-imports --config .importlinter

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: import-linter-results
          path: import_linter_results.txt
