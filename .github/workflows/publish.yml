name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Also publish to production PyPI (requires approval)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reject local version segments
        run: |
          pip install hatch hatch-vcs
          version=$(cd packages/pyapprox && hatch version)
          echo "Detected version: $version"
          if echo "$version" | grep -q '+'; then
            echo "::error::Version '$version' contains a local segment (+). Tag the commit with a clean version (e.g., v0.2.0) before publishing."
            exit 1
          fi
      - name: Build all packages
        run: |
          for pkg in packages/pyapprox packages/pyapprox-benchmarks packages/pyapprox-tutorials; do
            cd $pkg && hatch build && cd $GITHUB_WORKSPACE
          done
      - name: Show built versions
        run: ls -la packages/*/dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/

  test-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  verify-test-pypi:
    needs: test-pypi
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for TestPyPI index to update
        run: sleep 60
      - name: Install from TestPyPI and verify
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            pyapprox pyapprox-benchmarks pyapprox-tutorials
          python -c "import pyapprox; print(f'pyapprox {pyapprox.__version__}')"
          python -c "import pyapprox_benchmarks; print('pyapprox-benchmarks OK')"
          python -c "import pyapprox_tutorials; print('pyapprox-tutorials OK')"
      - name: Smoke test
        run: |
          python -c "
          from pyapprox.util.backends.numpy import NumpyBkd
          bkd = NumpyBkd()
          x = bkd.array([[1.0, 2.0, 3.0]])
          assert x.shape == (1, 3)
          print('Smoke test passed')
          "

  pypi:
    needs: verify-test-pypi
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_to_pypi
    runs-on: ubuntu-latest
    environment: pypi-production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
