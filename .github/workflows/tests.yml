name: Tests

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pyapprox[fem,umbridge,test]" -e packages/pyapprox-benchmarks
      - name: Run fast tests (PR — fail-fast)
        if: github.event_name == 'pull_request'
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short --timeout=300
      - name: Run fast tests (push — show all failures)
        if: github.event_name != 'pull_request'
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short --timeout=300

  minimal:
    name: Minimal install (no optional deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: Linux-pip-3.12-minimal-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: Linux-pip-3.12-minimal-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pyapprox[test]" -e packages/pyapprox-benchmarks
      - name: Verify package imports
        run: python -c "import pyapprox; print('Core import OK')"
      - name: Run fast tests (no optional deps)
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short --timeout=300

  slow:
    name: Slow tests (>5s)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: Linux-pip-3.12-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: Linux-pip-3.12-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pyapprox[fem,umbridge,test]" -e packages/pyapprox-benchmarks
      - name: Run slow tests only
        env:
          PYAPPROX_RUN_SLOW: "1"
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short -m slow_on --timeout=600

  slower:
    name: Slower tests (>30s)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: Linux-pip-3.12-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: Linux-pip-3.12-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pyapprox[fem,umbridge,test]" -e packages/pyapprox-benchmarks
      - name: Run slower tests only
        env:
          PYAPPROX_RUN_SLOWER: "1"
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short -m slower_on --timeout=1200

  slowest:
    name: Slowest tests (>60s)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: Linux-pip-3.12-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: Linux-pip-3.12-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pyapprox[fem,umbridge,test]" -e packages/pyapprox-benchmarks
      - name: Run slowest tests only
        env:
          PYAPPROX_RUN_SLOWEST: "1"
        run: pytest packages/pyapprox/tests packages/pyapprox-benchmarks/tests tests/integration -v --tb=short -m slowest_on --timeout=1800
