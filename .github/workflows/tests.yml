name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[fem,umbridge,test]"
      - name: Run tests (PR — fail-fast)
        if: github.event_name == 'pull_request'
        run: pytest pyapprox -v --tb=short -x --timeout=300
      - name: Run tests (push — show all failures)
        if: github.event_name != 'pull_request'
        run: pytest pyapprox -v --tb=short --timeout=300
      - name: Run slow tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PYAPPROX_RUN_SLOW: "1"
        run: pytest pyapprox -v --tb=short -m slow --timeout=600
