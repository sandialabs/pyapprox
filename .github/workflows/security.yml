name: Security

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main, "dev/**"]
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --format json --output pip-audit-report.json
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  bandit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r pyapprox/ \
            --exclude tests \
            --severity-level high \
            --format sarif \
            --output bandit-report.sarif || true
      - name: Ensure bandit SARIF exists
        if: always()
        run: |
          if [ ! -f bandit-report.sarif ]; then
            cat > bandit-report.sarif << 'SARIF'
          {"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Bandit","rules":[]}},"results":[]}]}
          SARIF
          fi
      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-report.sarif
          category: bandit
      - name: Fail on HIGH findings
        run: |
          bandit -r pyapprox/ \
            --exclude tests \
            --severity-level high
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Run semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --sarif \
            --output semgrep-report.sarif \
            pyapprox/ || true
      - name: Ensure semgrep SARIF exists
        if: always()
        run: |
          if [ ! -f semgrep-report.sarif ]; then
            cat > semgrep-report.sarif << 'SARIF'
          {"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}
          SARIF
          fi
      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep
      - name: Fail on findings
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --error \
            pyapprox/
