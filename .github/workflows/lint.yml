name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/pyapprox/src/pyapprox/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy numpy torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e "packages/pyapprox[lint]"
      - name: mypy ratchet (must not exceed baseline)
        run: bash scripts/mypy_diff.sh 1662 packages/pyapprox/src/pyapprox/

