name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: |
          pip install -e ".[docs-build]"
          pip install ipykernel
          python -m ipykernel install --user
      - name: Render tutorials
        run: cd tutorials && ./build.sh --notebooks 2>&1 | tee /tmp/quarto-build.log
      - name: Check for unresolved crossrefs
        run: |
          if grep "Unable to resolve crossref\|Unable to resolve link target" /tmp/quarto-build.log | grep -v "notebooks/.*\.ipynb" | grep -q .; then
            echo "ERROR: Unresolved crossrefs or link targets found:"
            grep "Unable to resolve crossref\|Unable to resolve link target" /tmp/quarto-build.log | grep -v "notebooks/.*\.ipynb"
            exit 1
          fi
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-build-logs
          path: tutorials/library/_build_logs/
          retention-days: 7
          if-no-files-found: ignore
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tutorials/library/_site
