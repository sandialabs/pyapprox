project:
  type: website
  output-dir: _site

website:
  title: "PyApprox"
  site-url: https://sandialabs.github.io/pyapprox/
  description: "Open-source Python toolkit for uncertainty quantification, surrogate modeling, Bayesian experimental design, and sensitivity analysis. 80+ validated tutorials backed by Sandia National Laboratories."
  favicon: assets/favicon.ico
  open-graph: true
  navbar:
    logo: assets/pyapprox-logo.png
    left:
      - text: "Home"
        href: index.qmd
      - text: "Tutorials"
        href: tutorials.qmd
      - text: "Topics"
        menu:
          - text: "Tutorial Index"
            href: tutorials.qmd
          - text: "Forward UQ"
            href: tutorials.qmd#forward-uq
          - text: "Multifidelity Estimation"
            href: tutorials.qmd#multifidelity-estimation
          - text: "Inverse UQ"
            href: tutorials.qmd#inverse-uq
          - text: "Experimental Design"
            href: tutorials.qmd#experimental-design
          - text: "Surrogate Modeling"
            href: tutorials.qmd#surrogate-modeling
          - text: "Sensitivity Analysis"
            href: tutorials.qmd#sensitivity-analysis
    right:
      - icon: github
        href: https://github.com/sandialabs/pyapprox
  page-footer:
    left: "Copyright Sandia National Laboratories (NTESS). MIT License."
    center: "Built with [Quarto](https://quarto.org)"
    right: "[Repository](https://github.com/sandialabs/pyapprox) | [PyPI](https://pypi.org/project/pyapprox/)"
  sidebar:
    - title: "Tutorials"
      style: "docked"
      search: true
      contents:
        - section: "Getting Started"
          contents:
            - setup_environment.qmd
            - models_decisions_uncertainty.qmd
        - section: "Forward UQ"
          contents:
            - forward_uq.qmd
            - random_variables_distributions.qmd
            - monte_carlo_sampling.qmd
            - estimator_accuracy_mse.qmd
            - mc_budget_estimation.qmd
        - section: "Multifidelity Estimation"
          contents:
            - control_variate_concept.qmd
            - control_variate_analysis.qmd
            - acv_concept.qmd
            - acv_many_models_concept.qmd
            - acv_many_models_analysis.qmd
            - mfmc_concept.qmd
            - mfmc_analysis.qmd
            - mlmc_concept.qmd
            - mlmc_analysis.qmd
            - multioutput_acv_concept.qmd
            - multioutput_acv_analysis.qmd
            - pacv_concept.qmd
            - pacv_analysis.qmd
            - mlblue_concept.qmd
            - mlblue_analysis.qmd
            - pilot_studies_concept.qmd
            - pilot_studies_analysis.qmd
            - ensemble_selection_concept.qmd
            - multifidelity_estimation_cookbook.qmd
        - section: "Inverse UQ"
          contents:
            - bayesian_inference_intro.qmd
            - mcmc_sampling.qmd
            - dram_mcmc.qmd
            - vi_intro.qmd
            - vi_objective.qmd
            - vi_optimization.qmd
            - vi_families.qmd
            - vi_amortized.qmd
        - section: "Experimental Design"
          contents:
            - experimental_design_intro.qmd
            - section: "KL-Based OED"
              contents:
                - boed_kl_concept.qmd
                - boed_kl_estimator.qmd
                - boed_kl_gradients.qmd
                - boed_kl_usage.qmd
                - boed_kl_qmc.qmd
                - boed_kl_nonlinear_usage.qmd
                - boed_kl_design_stability.qmd
            - section: "Goal-Oriented OED"
              contents:
                - boed_pred_concept.qmd
                - boed_pred_gaussian_analysis.qmd
                - boed_pred_lognormal_analysis.qmd
                - boed_pred_usage.qmd
                - boed_pred_nonlinear_usage.qmd
            - section: "OED Workflows"
              contents:
                - boed_data_workflow_usage.qmd
        - section: "Approximation Theory"
          contents:
            - lagrange_interpolation.qmd
            - piecewise_interpolation.qmd
            - tensor_product_interpolation.qmd
            - gauss_quadrature.qmd
            - piecewise_quadrature.qmd
            - leja_sequences.qmd
        - section: "Surrogate Modeling"
          contents:
            - section: "Polynomial Chaos"
              contents:
                - polynomial_chaos_surrogates.qmd
                - practical_pce_fitting.qmd
                - sparse_pce_fitting.qmd
                - uq_with_pce.qmd
            - section: "Function Trains"
              contents:
                - function_train_surrogates.qmd
                - uq_with_functiontrain.qmd
            - section: "Sparse Grids"
              contents:
                - isotropic_sparse_grids.qmd
                - adaptive_sparse_grids.qmd
                - multifidelity_sparse_grids.qmd
                - sparse_grid_to_pce_conversion.qmd
                - uq_with_sparse_grids.qmd
            - section: "Gaussian Processes"
              contents:
                - gp_surrogate.qmd
                - uq_with_gp.qmd
                - adaptive_gp_sampling.qmd
                - multioutput_gp.qmd
        - section: "Sensitivity Analysis"
          contents:
            - sensitivity_analysis_concept.qmd
            - sobol_sensitivity_analysis.qmd
            - pce_sensitivity.qmd
            - gp_sensitivity.qmd
            - morris_screening.qmd
            - bin_based_sensitivity.qmd
            - functiontrain_sensitivity_math.qmd
            - functiontrain_sensitivity.qmd
        - section: "Random Fields"
          contents:
            - kle_introduction.qmd
            - kle_mesh_and_data_driven.qmd
            - kle_spde.qmd
        - section: "Optimization Under Uncertainty"
          contents:
            - design_under_uncertainty.qmd

format:
  html:
    theme:
      - cosmo
      - custom.scss
    highlight-style: github
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - file: ../_macros_html.tex

execute:
  echo: true
  warning: false
  freeze: auto

jupyter: python3

notebook-links: true
