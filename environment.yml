name: pyapprox
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  - numpy>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - sympy>=1.12
  - pytorch>=2.0
  - networkx>=3.0
  - pytest>=7.4
  - pytest-cov>=4.1
  - mypy>=1.8
  - pip
  - pip:
    - scikit-fem>=9.0
    - umbridge>=0.7
    - pytest-timeout>=2.2
    - ruff>=0.3
    - hatch
    - hatch-vcs
    - jupyter-cache>=1.0
    - quartodoc>=0.6
    # Heavy optional deps not included here (compile from source):
    #   pip install -e "packages/pyapprox[rol]"    # ROL optimizer (rol-python)
